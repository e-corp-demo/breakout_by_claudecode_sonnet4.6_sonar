<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Breakout</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', Courier, monospace;
      user-select: none;
      overflow: hidden;
    }

    #gameCanvas {
      display: block;
      border: 1px solid rgba(0, 255, 255, 0.15);
      box-shadow:
        0 0 24px rgba(0, 255, 255, 0.08),
        0 0 70px rgba(255, 0, 122, 0.05);
    }

    #hint {
      margin-top: 12px;
      color: rgba(0, 255, 255, 0.4);
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <p id="hint">Arrow Keys / Mouse &nbsp;·&nbsp; Space to Launch / Pause</p>
  <script src="game.js"></script>
</body>
</html>
